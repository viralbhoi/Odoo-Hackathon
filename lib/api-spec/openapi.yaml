openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TransitOps Smart Transport Operations Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and authorization
  - name: vehicles
    description: Vehicle registry management
  - name: drivers
    description: Driver management
  - name: trips
    description: Trip dispatch and lifecycle
  - name: maintenance
    description: Vehicle maintenance management
  - name: fuel-logs
    description: Fuel log management
  - name: expenses
    description: Expense tracking
  - name: dashboard
    description: Dashboard KPIs and metrics
  - name: reports
    description: Analytics and reporting

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginCredentials"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenInput"
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid refresh token

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and revoke token
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated

  # ─── VEHICLES ─────────────────────────────────────────────────────────────────
  /vehicles:
    get:
      operationId: listVehicles
      tags: [vehicles]
      summary: List all vehicles
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/VehicleStatus"
        - name: type
          in: query
          schema:
            type: string
        - name: region
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"
    post:
      operationId: createVehicle
      tags: [vehicles]
      summary: Register a new vehicle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleInput"
      responses:
        "201":
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Registration number already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vehicles/available:
    get:
      operationId: listAvailableVehicles
      tags: [vehicles]
      summary: List vehicles available for dispatch (excludes In Shop, Retired, On Trip)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Available vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"

  /vehicles/{id}:
    get:
      operationId: getVehicle
      tags: [vehicles]
      summary: Get a vehicle by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vehicle detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateVehicle
      tags: [vehicles]
      summary: Update vehicle details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleUpdate"
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vehicles/{id}/retire:
    patch:
      operationId: retireVehicle
      tags: [vehicles]
      summary: Retire a vehicle
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Retired vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── DRIVERS ──────────────────────────────────────────────────────────────────
  /drivers:
    get:
      operationId: listDrivers
      tags: [drivers]
      summary: List all drivers
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/DriverStatus"
        - name: region
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: expiringLicense
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of drivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Driver"
    post:
      operationId: createDriver
      tags: [drivers]
      summary: Register a new driver
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverInput"
      responses:
        "201":
          description: Driver created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /drivers/available:
    get:
      operationId: listAvailableDrivers
      tags: [drivers]
      summary: List drivers available for dispatch (Available status, valid license)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Available drivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Driver"

  /drivers/{id}:
    get:
      operationId: getDriver
      tags: [drivers]
      summary: Get a driver by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Driver detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateDriver
      tags: [drivers]
      summary: Update driver profile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverUpdate"
      responses:
        "200":
          description: Updated driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /drivers/{id}/suspend:
    patch:
      operationId: suspendDriver
      tags: [drivers]
      summary: Suspend a driver
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Suspended driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /drivers/{id}/status:
    patch:
      operationId: updateDriverStatus
      tags: [drivers]
      summary: Update driver status manually (Available / Off Duty)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverStatusUpdate"
      responses:
        "200":
          description: Updated driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  # ─── TRIPS ────────────────────────────────────────────────────────────────────
  /trips:
    get:
      operationId: listTrips
      tags: [trips]
      summary: List all trips
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/TripStatus"
        - name: vehicleId
          in: query
          schema:
            type: integer
        - name: driverId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"
    post:
      operationId: createTrip
      tags: [trips]
      summary: Create a new trip (Draft state)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripInput"
      responses:
        "201":
          description: Trip created in Draft state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "400":
          description: Validation error (capacity exceeded, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trips/{id}:
    get:
      operationId: getTrip
      tags: [trips]
      summary: Get a trip by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateTrip
      tags: [trips]
      summary: Update a trip (only in Draft state)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripUpdate"
      responses:
        "200":
          description: Updated trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{id}/dispatch:
    post:
      operationId: dispatchTrip
      tags: [trips]
      summary: Dispatch a trip (Draft → Dispatched, sets vehicle + driver On Trip)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dispatched trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "400":
          description: Business rule violation (capacity, availability, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trips/{id}/complete:
    post:
      operationId: completeTrip
      tags: [trips]
      summary: Complete a trip (Dispatched → Completed, restores vehicle + driver)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripCompletion"
      responses:
        "200":
          description: Completed trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trips/{id}/cancel:
    post:
      operationId: cancelTrip
      tags: [trips]
      summary: Cancel a trip (restores vehicle + driver if dispatched)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  # ─── MAINTENANCE ──────────────────────────────────────────────────────────────
  /maintenance:
    get:
      operationId: listMaintenance
      tags: [maintenance]
      summary: List maintenance records
      security:
        - bearerAuth: []
      parameters:
        - name: vehicleId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/MaintenanceStatus"
      responses:
        "200":
          description: List of maintenance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaintenanceLog"
    post:
      operationId: createMaintenance
      tags: [maintenance]
      summary: Create maintenance record (sets vehicle to In Shop)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceInput"
      responses:
        "201":
          description: Maintenance record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceLog"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /maintenance/{id}:
    get:
      operationId: getMaintenance
      tags: [maintenance]
      summary: Get maintenance record by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Maintenance record detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceLog"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /maintenance/{id}/close:
    post:
      operationId: closeMaintenance
      tags: [maintenance]
      summary: Close maintenance record (restores vehicle to Available unless Retired)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceClose"
      responses:
        "200":
          description: Closed maintenance record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceLog"

  # ─── FUEL LOGS ────────────────────────────────────────────────────────────────
  /fuel-logs:
    get:
      operationId: listFuelLogs
      tags: [fuel-logs]
      summary: List fuel logs
      security:
        - bearerAuth: []
      parameters:
        - name: vehicleId
          in: query
          schema:
            type: integer
        - name: tripId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of fuel logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FuelLog"
    post:
      operationId: createFuelLog
      tags: [fuel-logs]
      summary: Record a fuel log entry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FuelLogInput"
      responses:
        "201":
          description: Fuel log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FuelLog"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── EXPENSES ─────────────────────────────────────────────────────────────────
  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List expenses
      security:
        - bearerAuth: []
      parameters:
        - name: vehicleId
          in: query
          schema:
            type: integer
        - name: tripId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/ExpenseType"
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Record an expense
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Expense created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── DASHBOARD ────────────────────────────────────────────────────────────────
  /dashboard/kpis:
    get:
      operationId: getDashboardKpis
      tags: [dashboard]
      summary: Get dashboard KPI metrics
      security:
        - bearerAuth: []
      parameters:
        - name: vehicleType
          in: query
          schema:
            type: string
        - name: region
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Dashboard KPIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardKpis"

  /dashboard/recent-trips:
    get:
      operationId: getRecentTrips
      tags: [dashboard]
      summary: Get recent trips for the dashboard live board
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recent trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"

  /dashboard/vehicle-status-summary:
    get:
      operationId: getVehicleStatusSummary
      tags: [dashboard]
      summary: Get vehicle status distribution for charts
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Vehicle status counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleStatusSummary"

  # ─── REPORTS ──────────────────────────────────────────────────────────────────
  /reports/fleet-utilization:
    get:
      operationId: getFleetUtilization
      tags: [reports]
      summary: Fleet utilization report
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Fleet utilization metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetUtilizationReport"

  /reports/fuel-efficiency:
    get:
      operationId: getFuelEfficiency
      tags: [reports]
      summary: Fuel efficiency report per vehicle
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Fuel efficiency metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FuelEfficiencyRecord"

  /reports/operational-cost:
    get:
      operationId: getOperationalCost
      tags: [reports]
      summary: Operational cost report per vehicle (fuel + maintenance)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Operational costs per vehicle
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OperationalCostRecord"

  /reports/vehicle-roi:
    get:
      operationId: getVehicleRoi
      tags: [reports]
      summary: Vehicle ROI report
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Vehicle ROI metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VehicleRoiRecord"

  /reports/monthly-fuel-trend:
    get:
      operationId: getMonthlyFuelTrend
      tags: [reports]
      summary: Monthly fuel cost trend for charting
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Monthly fuel trends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyTrendRecord"

  /reports/export/csv:
    get:
      operationId: exportCsv
      tags: [reports]
      summary: Export operational data as CSV
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [vehicles, drivers, trips, fuel-logs, expenses, maintenance]
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string

    # ─── ENUMS ──────────────────────────────────────────────────────────────────
    VehicleStatus:
      type: string
      enum: [available, on_trip, in_shop, retired]

    DriverStatus:
      type: string
      enum: [available, on_trip, off_duty, suspended]

    TripStatus:
      type: string
      enum: [draft, dispatched, completed, cancelled]

    MaintenanceStatus:
      type: string
      enum: [open, closed]

    ExpenseType:
      type: string
      enum: [fuel, toll, maintenance, other]

    UserRole:
      type: string
      enum: [fleet_manager, dispatcher, safety_officer, financial_analyst]

    # ─── AUTH ───────────────────────────────────────────────────────────────────
    LoginCredentials:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 1
